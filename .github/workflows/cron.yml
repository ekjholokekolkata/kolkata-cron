name: Continuous 24-7 Cloud Cron Engine

on:
  schedule:
    # Wakes up a container every 5 minutes automatically, 24/7
    - cron: '*/5 * * * *'
  workflow_dispatch: 

env:
  # Forces all JavaScript steps to run on the modern Node 24 architecture securely
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run_cron_loop:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Code Base
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Crucial for the automatic keep-alive system to push changes

      - name: Setup Node Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded to 24 to match modern runner standards

      - name: Install Google Chrome Dependencies
        run: npm install puppeteer

      - name: Execute High Speed 30-Sec Loop
        run: |
          echo "Starting absolute continuous background engine..."
          # Running exactly 10 loops to seamlessly cover the entire 5-minute container window
          for i in {1..10}
          do
            echo "--------------------------------------"
            echo "Cycle Run #$i active..."
            
            node trigger.js
            
            echo "Waiting 30 seconds..."
            sleep 30
          done
          echo "Container window filled cleanly."

      # CRITICAL AUTOMATION: Resets GitHub's 60-day inactivity timer automatically
      - name: Auto-KeepAlive Repository (Resets 60-Day Expiry)
        run: |
          # Only runs on the 1st day of the month to prevent file spamming
          if [ "$(date +%d)" = "01" ]; then
            echo "Beginning monthly repository keep-alive check..."
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            date > keep_alive.txt
            git add keep_alive.txt
            git commit -m "Automated system update: Keep-Alive pulse" || exit 0
            git push
            echo "Keepalive check cleared. Expiry timer successfully reset for another 60 days."
          else
            echo "Keepalive check skipped (Runs automatically on the 1st of every month)."
          fi
