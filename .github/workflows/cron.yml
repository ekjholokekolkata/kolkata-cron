name: Central Notifier Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run_cron:
    runs-on: ubuntu-latest

    steps:
      - name: Call Central Notifier
        run: |
          echo "Running central notifier..."

          curl -L \
            --fail \
            --show-error \
            --max-time 30 \
            "https://ekjholokekolkata.page.gd/central_notifier.php?i=1"

          echo "Done."
