name: Continuous 24-7 Cloud Cron Engine

on:
  schedule:
    # Wakes up a container every 5 minutes automatically, 24/7
    - cron: '*/5 * * * *'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run_cron_loop:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Code Base
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Crucial for the automatic keep-alive system to push changes

      - name: Setup Node Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # SPEED FIX: Cache node_modules and Puppeteer browser binaries so they don't fresh-download every 5 minutes
      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/puppeteer
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install Puppeteer efficiently
      - name: Install Google Chrome Dependencies
        run: |
          npm install puppeteer
          # Ensure Puppeteer's Chrome binary is fully installed and executable in the runner
          npx puppeteer browsers install chrome

      - name: Execute High Speed Balanced Loop
        run: |
          echo "Starting absolute continuous background engine..."
          
          # Balanced to exactly 7 cycles with an active 25-second delay.
          # Including the execution overhead of Puppeteer (~11-12s per hit), 
          # 7 cycles will consistently finish at around 4 minutes and 20 seconds.
          # This leaves a safe 40-second buffer for the container to save cache and exit cleanly 
          # BEFORE GitHub triggers the next chronological container, preventing overlap.
          
          for i in {1..7}
          do
            echo "--------------------------------------"
            echo "Cycle Run #$i active at $(date +'%T')..."
            
            # Execute your trigger script
            node trigger.js
            
            echo "Cycle #$i finished processing. Sleeping for 25 seconds..."
            sleep 25
          done
          echo "Container window filled cleanly and closed ahead of next schedule."

      # CRITICAL AUTOMATION: Resets GitHub's 60-day inactivity timer automatically
      - name: Auto-KeepAlive Repository (Resets 60-Day Expiry)
        run: |
          # Runs seamlessly on the 1st day of the month to keep the cron engine from expiring
          if [ "$(date +%d)" = "01" ]; then
            echo "Beginning monthly repository keep-alive check..."
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            date > keep_alive.txt
            git add keep_alive.txt
            git commit -m "Automated system update: Keep-Alive pulse" || exit 0
            git push
            echo "Keepalive check cleared. Expiry timer successfully reset for another 60 days."
          else
            echo "Keepalive check skipped (Runs automatically on the 1st of every month)."
          fi
