name: High-Speed 30-Sec Notifier Cron

on:
  schedule:
    # Triggers the runner container once every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Keeps manual testing button active

jobs:
  run_fast_cron:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Loop Every 30 Seconds
        run: |
          echo "Starting high-speed notification engine..."
          
          # Run a loop exactly 10 times (10 times * 30 seconds = 5 minutes total runtime)
          for i in {1..10}
          do
            echo "Execution cycle #$i running..."
            
            # Fire the request pretending to be a real browser passing the security checkpoint
            curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.5" \
            --cookie "__test=f655ba9d09a112d4968c63579db590b4;" \
            "https://ekjholokekolkata.page.gd/central_notifier.php"
            
            echo "Request sent. Waiting 30 seconds before next check..."
            sleep 30
          done
          
          echo "5-minute block completed safely. Handing over to next scheduled runner."
