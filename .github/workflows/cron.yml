name: High-Speed 30-Sec Notifier Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  run_fast_cron:
    runs-on: ubuntu-latest
    steps:
      - name: Install Headless Browser Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y w3m

      - name: Execute Loop Every 30 Seconds
        run: |
          echo "Starting high-speed notification engine..."
          
          for i in {1..10}
          do
            echo "Execution cycle #$i running..."
            
            # w3m automatically handles the JavaScript challenge, saves cookies, and hits the target
            w3m -dump "https://ekjholokekolkata.page.gd/central_notifier.php"
            
            echo "Request processed. Waiting 30 seconds..."
            sleep 30
          done
          
          echo "5-minute block completed safely."
