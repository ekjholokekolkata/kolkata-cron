name: High-Speed 30-Sec Notifier Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  run_fast_cron:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize System Python Environments
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Decryption Dependencies
        run: pip install requests pycryptodome

      - name: Execute Loop Every 30 Seconds
        run: |
          echo "Starting custom Python bypass notification engine..."
          
          for i in {1..10}
          do
            echo "Execution cycle #$i running..."
            
            # Execute the auto-decryption utility script
            python bypass.py
            
            echo "Request processed. Waiting 30 seconds..."
            sleep 30
          done
          
          echo "5-minute block completed safely."
